services:
  - type: web
    name: spam-message-identifier
    env: python
    plan: free
    rootDir: .
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: python -m gunicorn app:app --bind 0.0.0.0:${PORT:-10000} --workers 1 --timeout 120
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONUNBUFFERED
        value: "1"
